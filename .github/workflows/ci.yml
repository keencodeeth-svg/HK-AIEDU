name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Workflows
        uses: rhysd/actionlint@v1.7.11

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build test server
        run: npm run build

      - name: Run unit and API tests
        run: npm test

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build browser smoke server
        run: npm run build

      - name: Run browser smoke suite
        run: npm run test:browser

  verify:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workflow-lint
      - lint
      - build
      - test
      - browser-smoke
    steps:
      - name: Publish Verify Summary
        run: |
          {
            echo "## CI Verify Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| workflow-lint | ${{ needs['workflow-lint'].result }} |"
            echo "| lint | ${{ needs.lint.result }} |"
            echo "| build | ${{ needs.build.result }} |"
            echo "| test | ${{ needs.test.result }} |"
            echo "| browser-smoke | ${{ needs['browser-smoke'].result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce all checks passed
        run: |
          status_workflow="${{ needs['workflow-lint'].result }}"
          status_lint="${{ needs.lint.result }}"
          status_build="${{ needs.build.result }}"
          status_test="${{ needs.test.result }}"

          for entry in \
            "workflow-lint:$status_workflow" \
            "lint:$status_lint" \
            "build:$status_build" \
            "test:$status_test" \
            "browser-smoke:${{ needs['browser-smoke'].result }}"; do
            name="${entry%%:*}"
            value="${entry##*:}"
            if [ "$value" != "success" ]; then
              echo "Required job failed: $name=$value"
              exit 1
            fi
          done
