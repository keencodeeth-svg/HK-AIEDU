name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Workflows
        uses: rhysd/actionlint@v1.7.11

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      LLM_PROVIDER_CHAIN: mock
      LLM_PROVIDER: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for API tests
        run: npm run build

      - name: API integration tests
        env:
          API_TEST_SERVER_MODE: start
          API_TEST_FALLBACK_TO_DEV: "0"
          API_TEST_SCOPE: health
        run: |
          set -o pipefail
          timeout 30m npm run test:api 2>&1 | tee api-tests.log

      - name: Upload API test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: api-tests.log
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  verify:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - workflow-lint
      - lint
      - api-tests
      - build
    steps:
      - name: Publish Verify Summary
        run: |
          {
            echo "## CI Verify Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| workflow-lint | ${{ needs['workflow-lint'].result }} |"
            echo "| lint | ${{ needs.lint.result }} |"
            echo "| api-tests | ${{ needs['api-tests'].result }} |"
            echo "| build | ${{ needs.build.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce all checks passed
        run: |
          status_workflow="${{ needs['workflow-lint'].result }}"
          status_lint="${{ needs.lint.result }}"
          status_api="${{ needs['api-tests'].result }}"
          status_build="${{ needs.build.result }}"

          for entry in \
            "workflow-lint:$status_workflow" \
            "lint:$status_lint" \
            "api-tests:$status_api" \
            "build:$status_build"; do
            name="${entry%%:*}"
            value="${entry##*:}"
            if [ "$value" != "success" ]; then
              echo "Required job failed: $name=$value"
              exit 1
            fi
          done
